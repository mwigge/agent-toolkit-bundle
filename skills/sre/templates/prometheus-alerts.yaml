---
# prometheus-alerts.yaml — Prometheus alerting rules for the chaos platform.
#
# Covers:
#   - HighErrorRate
#   - HighLatencyP99
#   - SLOBudgetBurnRateFast (page-level, 1h window)
#   - SLOBudgetBurnRateSlow (ticket-level, 6h window)
#
# Paste into your Prometheus rule file or ConfigMap.
# All alerts link to runbooks; replace the base URL with your internal wiki.

groups:
  - name: chaos-platform-slo
    interval: 30s
    rules:

      # -----------------------------------------------------------------------
      # High Error Rate (symptom-based)
      # Fires when >1% of requests are 5xx for 5 consecutive minutes
      # -----------------------------------------------------------------------
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{
              service="chaos-platform-api",
              status=~"5..",
              path!="/health"
            }[5m]))
            /
            sum(rate(http_requests_total{
              service="chaos-platform-api",
              path!="/health"
            }[5m]))
          ) > 0.01
        for: 5m
        labels:
          severity: critical
          team: platform
          service: chaos-platform-api
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: >
            The {{ $labels.service }} service is returning 5xx errors for
            {{ $value | humanizePercentage }} of requests (threshold: 1%).
            This is consuming the availability SLO error budget rapidly.
          runbook_url: "https://wiki.internal/runbooks/chaos-platform/high-error-rate"

      # -----------------------------------------------------------------------
      # High Latency P99
      # Fires when p99 latency exceeds 500ms for 10 consecutive minutes
      # -----------------------------------------------------------------------
      - alert: HighLatencyP99
        expr: |
          histogram_quantile(
            0.99,
            sum by (le) (
              rate(http_request_duration_seconds_bucket{
                service="chaos-platform-api",
                path!="/health"
              }[10m])
            )
          ) > 0.5
        for: 10m
        labels:
          severity: warning
          team: platform
          service: chaos-platform-api
        annotations:
          summary: "p99 latency exceeds 500ms on {{ $labels.service }}"
          description: >
            The 99th percentile request latency for {{ $labels.service }} is
            {{ $value | humanizeDuration }} (threshold: 500ms).
            SLO target is 99% of requests < 500ms.
          runbook_url: "https://wiki.internal/runbooks/chaos-platform/high-latency"

      # -----------------------------------------------------------------------
      # SLO Burn Rate — Fast (1h + 5m window)
      # Fires when error budget will be exhausted in < 2 days at current rate.
      # Burn rate = 14.4× (burns 1h of a 28d budget in 5min at this rate).
      # -----------------------------------------------------------------------
      - alert: SLOBudgetBurnRateFast
        expr: |
          (
            1 - (
              sum(rate(http_requests_total{
                service="chaos-platform-api",
                status!~"5..",
                path!="/health"
              }[1h]))
              /
              sum(rate(http_requests_total{
                service="chaos-platform-api",
                path!="/health"
              }[1h]))
            )
          ) / (1 - 0.999) > 14.4
          and
          (
            1 - (
              sum(rate(http_requests_total{
                service="chaos-platform-api",
                status!~"5..",
                path!="/health"
              }[5m]))
              /
              sum(rate(http_requests_total{
                service="chaos-platform-api",
                path!="/health"
              }[5m]))
            )
          ) / (1 - 0.999) > 14.4
        for: 2m
        labels:
          severity: critical
          team: platform
          service: chaos-platform-api
          slo: availability-999
          alert_type: burn_rate
        annotations:
          summary: "CRITICAL: {{ $labels.service }} availability SLO budget burning fast"
          description: >
            The {{ $labels.service }} service is consuming the 28-day availability
            error budget at {{ $value | humanize }}× the sustainable rate
            (threshold: 14.4×). At this rate the entire monthly budget will be
            exhausted in under 2 days. Immediate action required.
          runbook_url: "https://wiki.internal/runbooks/chaos-platform/slo-burn-rate-fast"

      # -----------------------------------------------------------------------
      # SLO Burn Rate — Slow (6h + 30m window)
      # Fires when error budget will be exhausted in < 5 days.
      # Burn rate = 6× (burns 6h of a 28d budget at 5× sustainable rate).
      # -----------------------------------------------------------------------
      - alert: SLOBudgetBurnRateSlow
        expr: |
          (
            1 - (
              sum(rate(http_requests_total{
                service="chaos-platform-api",
                status!~"5..",
                path!="/health"
              }[6h]))
              /
              sum(rate(http_requests_total{
                service="chaos-platform-api",
                path!="/health"
              }[6h]))
            )
          ) / (1 - 0.999) > 6.0
          and
          (
            1 - (
              sum(rate(http_requests_total{
                service="chaos-platform-api",
                status!~"5..",
                path!="/health"
              }[30m]))
              /
              sum(rate(http_requests_total{
                service="chaos-platform-api",
                path!="/health"
              }[30m]))
            )
          ) / (1 - 0.999) > 6.0
        for: 15m
        labels:
          severity: warning
          team: platform
          service: chaos-platform-api
          slo: availability-999
          alert_type: burn_rate
        annotations:
          summary: "WARNING: {{ $labels.service }} availability SLO budget burning slowly"
          description: >
            The {{ $labels.service }} service is consuming the 28-day availability
            error budget at {{ $value | humanize }}× the sustainable rate
            (threshold: 6×). At this rate the monthly budget will be exhausted
            in under 5 days. Investigation required; freeze new experiments
            if budget exceeds 50% consumed.
          runbook_url: "https://wiki.internal/runbooks/chaos-platform/slo-burn-rate-slow"

  # ---------------------------------------------------------------------------
  # Experiment-specific alerts
  # ---------------------------------------------------------------------------
  - name: chaos-experiments
    rules:

      - alert: ExperimentStuckRunning
        expr: |
          (
            time() - chaos_experiment_started_at_seconds{status="running"}
          ) > 3600
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Chaos experiment {{ $labels.experiment_id }} stuck in running state"
          description: >
            Experiment {{ $labels.experiment_id }} ({{ $labels.experiment_name }})
            has been in 'running' state for {{ $value | humanizeDuration }}.
            Expected maximum runtime is 1 hour. The kill switch may need to be triggered.
          runbook_url: "https://wiki.internal/runbooks/chaos-platform/stuck-experiment"

      - alert: HighExperimentFailureRate
        expr: |
          (
            sum(rate(chaos_experiments_total{status="failed"}[1h]))
            /
            sum(rate(chaos_experiments_total{status=~"completed|failed"}[1h]))
          ) > 0.20
        for: 15m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High experiment failure rate ({{ $value | humanizePercentage }})"
          description: >
            More than 20% of completed chaos experiments are failing in the last hour.
            This may indicate infrastructure instability or misconfigured experiments.
            Current failure rate: {{ $value | humanizePercentage }}.
          runbook_url: "https://wiki.internal/runbooks/chaos-platform/high-failure-rate"
