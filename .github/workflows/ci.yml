name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (warnings treated as errors)
        run: shellcheck -S warning hooks/*.sh scripts/*.sh install.sh

  smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: guard-patterns drift + fixture check
        run: bash scripts/test-guard-patterns.sh
      - name: skill-rules pattern check
        run: bash scripts/test-skill-rules.sh
